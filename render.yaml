services:
  - type: web
    name: secure-web-app-backend
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: http://localhost:5173,https://secure-web-app-teal.vercel.app
      - key: UPLOADS_DIR
        value: ./uploads
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SERVER
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: 1433
      - key: DB_ENCRYPT
        value: true
      - key: DB_TRUST_SERVER_CERTIFICATE
        value: false
      - key: JWT_SECRET
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SSL_PORT
        value: 465
      - key: SMTP_FAMILY
        value: 4
      - key: ENCRYPTION_KEY
        sync: false
